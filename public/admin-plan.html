<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Plan Korrektur</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F5F1EC;
            color: #2C2C2E;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            font-size: 24px;
            color: #C4A576;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #6B6B6B;
            font-size: 14px;
            margin-bottom: 32px;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            color: #2C2C2E;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #D4D0CB;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            background: #fff;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #C4A576;
        }
        textarea { resize: vertical; min-height: 100px; }
        .field { margin-bottom: 20px; }
        .row { display: flex; gap: 16px; }
        .row .field { flex: 1; }

        /* Login */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .login-box h1 { margin-bottom: 24px; }
        .login-box input { margin-bottom: 16px; }
        .login-error {
            color: #c0392b;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }

        /* Drop zone */
        .drop-zone {
            border: 2px dashed #D4D0CB;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: #fff;
            position: relative;
        }
        .drop-zone.dragover {
            border-color: #C4A576;
            background: #FAF6F0;
        }
        .drop-zone.has-file {
            border-color: #C4A576;
            background: #FAF6F0;
        }
        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }
        .drop-zone-text {
            color: #6B6B6B;
            font-size: 15px;
        }
        .drop-zone-text strong { color: #C4A576; }
        .file-name {
            margin-top: 8px;
            font-size: 13px;
            color: #C4A576;
            font-weight: 600;
        }

        /* Button */
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: #C4A576;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }
        .btn:hover { background: #B08F5F; }
        .btn:disabled { background: #D4D0CB; cursor: not-allowed; }
        .btn-secondary {
            background: transparent;
            color: #C4A576;
            border: 1px solid #C4A576;
            padding: 8px 20px;
            font-size: 14px;
        }
        .btn-secondary:hover { background: #FAF6F0; }

        /* Result */
        #result-area { display: none; margin-top: 32px; }
        .result-box {
            background: #fff;
            border: 1px solid #D4D0CB;
            border-radius: 12px;
            padding: 24px;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .result-header h2 {
            font-size: 18px;
            color: #C4A576;
        }
        .result-text {
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.7;
            color: #2C2C2E;
            max-height: 600px;
            overflow-y: auto;
        }
        .copy-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2C2C2E;
            color: #fff;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .copy-toast.show { opacity: 1; }

        /* Loading */
        .spinner {
            display: none;
            text-align: center;
            padding: 40px;
            color: #6B6B6B;
        }
        .spinner.active { display: block; }
        .spinner-dot {
            display: inline-block;
            width: 10px; height: 10px;
            background: #C4A576;
            border-radius: 50%;
            margin: 0 4px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .spinner-dot:nth-child(1) { animation-delay: -0.32s; }
        .spinner-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .error-msg {
            background: #fdf0ef;
            color: #c0392b;
            padding: 14px 18px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
    <div class="login-box">
        <h1>Admin Login</h1>
        <input type="password" id="pw-input" placeholder="Passwort eingeben" onkeydown="if(event.key==='Enter')doLogin()">
        <div class="login-error" id="login-error">Falsches Passwort</div>
        <button class="btn" onclick="doLogin()" style="width:100%">Einloggen</button>
    </div>
</div>

<!-- Main Tool -->
<div id="main-tool" style="display:none">
    <div class="container">
        <h1>Plan Korrektur Tool</h1>
        <p class="subtitle">PDF hochladen, Beschwerde eingeben, korrigierten Plan erhalten.</p>

        <form id="korrektur-form" onsubmit="submitForm(event)">
            <!-- PDF Upload -->
            <div class="field">
                <label>Trainingsplan PDF *</label>
                <div class="drop-zone" id="drop-zone">
                    <input type="file" id="pdf-input" accept=".pdf">
                    <div class="drop-zone-text">
                        <strong>Klicken</strong> oder PDF hierher ziehen
                    </div>
                    <div class="file-name" id="file-name"></div>
                </div>
            </div>

            <!-- Complaint -->
            <div class="field">
                <label>Kundenbeschwerde / Korrekturanweisung *</label>
                <textarea id="complaint" placeholder="z.B. Kunde hat 'Leinenziehen' ausgewaehlt, aber der Plan enthaelt Uebungen fuer 'Trennungsangst'. Bitte korrigieren."></textarea>
            </div>

            <!-- Optional fields -->
            <div class="row">
                <div class="field">
                    <label>Kundenname (optional)</label>
                    <input type="text" id="customer-name" placeholder="Max Mustermann">
                </div>
                <div class="field">
                    <label>Hundename (optional)</label>
                    <input type="text" id="dog-name" placeholder="Bello">
                </div>
            </div>

            <div class="field">
                <label>Hundeproblem (optional)</label>
                <select id="dog-problem">
                    <option value="">-- Nicht angegeben --</option>
                    <option value="pulling">Leinenziehen</option>
                    <option value="barking">Bellen</option>
                    <option value="aggression">Aggression</option>
                    <option value="anxiety">Trennungsangst</option>
                    <option value="recall">Rueckruf</option>
                    <option value="jumping">Anspringen</option>
                    <option value="energy">Ueberaktivitaet</option>
                    <option value="destructive">Zerstoererisches Verhalten</option>
                    <option value="mouthing">Beissen / Mouthing</option>
                </select>
            </div>

            <button type="submit" class="btn" id="submit-btn">Plan korrigieren</button>
        </form>

        <!-- Loading -->
        <div class="spinner" id="spinner">
            <div>
                <span class="spinner-dot"></span>
                <span class="spinner-dot"></span>
                <span class="spinner-dot"></span>
            </div>
            <p style="margin-top:16px">Plan wird analysiert und korrigiert... Das kann bis zu 60 Sekunden dauern.</p>
        </div>

        <!-- Error -->
        <div class="error-msg" id="error-msg"></div>

        <!-- Result -->
        <div id="result-area">
            <!-- E-Mail Vorschau -->
            <div class="result-box" style="margin-bottom: 16px; border: 2px solid #C4A576;">
                <div class="result-header">
                    <h2 style="font-size: 15px;">E-Mail Vorlage</h2>
                    <button class="btn btn-secondary" onclick="copyEmail()" style="padding: 6px 12px; font-size: 12px;">E-Mail kopieren</button>
                </div>
                <div class="result-text" id="email-text" style="font-size: 13px; line-height: 1.6; white-space: pre-wrap;"></div>
            </div>

            <!-- Plan -->
            <div class="result-box">
                <div class="result-header">
                    <h2>Korrigierter Plan</h2>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn btn-secondary" onclick="copyResult()">Plan kopieren</button>
                        <button class="btn" onclick="downloadPDF()" style="padding: 8px 16px; font-size: 13px;">Als PDF speichern</button>
                    </div>
                </div>
                <div class="result-text" id="result-text"></div>
            </div>
        </div>
    </div>
</div>

<div class="copy-toast" id="copy-toast">Text kopiert!</div>

<script>
    const PASS = 'pfoten2024';
    let droppedFile = null;
    let toolReady = false;

    function showTool() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-tool').style.display = 'block';
        if (!toolReady) {
            toolReady = true;
            const dropZone = document.getElementById('drop-zone');
            const pdfInput = document.getElementById('pdf-input');
            const fileNameEl = document.getElementById('file-name');
            if (dropZone) {
                dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
                dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
                dropZone.addEventListener('drop', e => {
                    e.preventDefault();
                    dropZone.classList.remove('dragover');
                    const file = e.dataTransfer.files[0];
                    if (file && (file.type === 'application/pdf' || file.name.endsWith('.pdf'))) {
                        droppedFile = file;
                        fileNameEl.textContent = file.name;
                        dropZone.classList.add('has-file');
                    }
                });
                pdfInput.addEventListener('change', () => {
                    droppedFile = null;
                    if (pdfInput.files.length) {
                        fileNameEl.textContent = pdfInput.files[0].name;
                        dropZone.classList.add('has-file');
                    }
                });
            }
        }
    }

    function doLogin() {
        const val = document.getElementById('pw-input').value;
        if (val === PASS) {
            localStorage.setItem('admin_logged_in', 'true');
            showTool();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    // Auto-Login
    if (localStorage.getItem('admin_logged_in') === 'true') {
        showTool();
    }

    const PROBLEM_LABELS = {
        pulling: 'Leinenziehen', barking: 'Bellen', aggression: 'Aggression',
        anxiety: 'Trennungsangst', recall: 'Rückruf', jumping: 'Anspringen',
        energy: 'Überaktivität', destructive: 'Zerstörerisches Verhalten', mouthing: 'Beißen / Mouthing'
    };

    // Submit
    async function submitForm(e) {
        e.preventDefault();
        const pdfInput = document.getElementById('pdf-input');
        const pdf = (pdfInput && pdfInput.files[0]) || droppedFile;
        const complaint = document.getElementById('complaint').value.trim();

        if (!pdf) return alert('Bitte eine PDF-Datei hochladen.');
        if (!complaint) return alert('Bitte eine Beschwerde / Korrekturanweisung eingeben.');
        if (pdf.size > 10 * 1024 * 1024) return alert('PDF ist zu groß (max. 10 MB).');

        const customerName = document.getElementById('customer-name').value.trim();
        const dogName = document.getElementById('dog-name').value.trim();
        const dogProblem = document.getElementById('dog-problem').value;

        document.getElementById('submit-btn').disabled = true;
        document.getElementById('spinner').classList.add('active');
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('error-msg').style.display = 'none';

        // PDF als Base64 lesen
        const reader = new FileReader();
        reader.onload = async function() {
            const base64 = reader.result.split(',')[1];
            await sendRequest(base64, complaint, customerName, dogName, dogProblem);
        };
        reader.readAsDataURL(pdf);
    }

    async function sendRequest(pdfBase64, complaint, customerName, dogName, dogProblem) {
        try {
            // API Key vom Server holen
            const keyRes = await fetch('/api/admin/plan-korrektur', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'get-key' })
            });
            const keyData = await keyRes.json();
            if (!keyData.apiKey) throw new Error('API Key nicht verfügbar');

            // Context bauen
            let context = '';
            if (customerName) context += 'Kundenname: ' + customerName + '\n';
            if (dogName) context += 'Hundename: ' + dogName + '\n';
            if (dogProblem && PROBLEM_LABELS[dogProblem]) context += 'Hundeproblem: ' + PROBLEM_LABELS[dogProblem] + '\n';

            let userMessage = '';
            if (context) userMessage += 'ZUSATZINFORMATIONEN:\n' + context + '\n';
            userMessage += 'BESCHWERDE / KORREKTURANWEISUNG:\n' + complaint + '\n\nBitte analysiere den angehaengten Trainingsplan und erstelle eine korrigierte Version.';

            // Direkt an Anthropic API senden (umgeht Vercel Body-Limit)
            const res = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': keyData.apiKey,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 12000,
                    system: `Du bist ein erfahrener Hundetrainer-Assistent. Analysiere den Trainingsplan, verstehe die Beschwerde, und erstelle eine korrigierte Version.

WICHTIG - FORMATIERUNG:
- Verwende KEIN Markdown. Keine Hashtags (#), keine Sterne (*/**), keine Unterstriche (_).
- Trenne jede Seite mit einer Zeile die nur === enthält.
- Schreibe reinen Text mit klaren Absätzen.

GESAMTSTRUKTUR DES PLANS:

=== (Seitenumbruch)
SEITE 1 - TITELSEITE:
[Hundename]'s persönlicher Zusatz-Plan

=== (Seitenumbruch)
SEITE 2 - EINLEITUNG (diese Seite soll gut gefüllt sein, aber NICHT über den Seitenrand hinausgehen):

Titel: "So nutzt du diesen Plan"

Schreibe einen warmen, persönlichen Einleitungstext in 3 Abschnitten. Der Text soll sich lesen wie ein Brief von einem Hundetrainer - nicht wie eine Bedienungsanleitung. Verwende den Hundenamen durchgehend.

ABSCHNITT 1 (4-5 Sätze):
Erkläre das Problem des Hundes einfühlsam. Zeige Verständnis ("Das kennen viele Hundebesitzer"). Erkläre warum dieser Plan anders ist als allgemeine Tipps aus dem Internet - er ist genau auf diesen Hund zugeschnitten. Mach Mut, dass Veränderung möglich ist, auch wenn es sich gerade schwer anfühlt.

ABSCHNITT 2 - Schreibe die Überschrift "Dein 3-Monats-Fahrplan" als eigene Zeile. Dann für jeden Monat:

Schreibe "Monat 1 (Woche 1-4): Übung 1 und 2" als eigene fettgedruckte Zeile.
Dann eine Leerzeile, dann 2-3 Sätze Erklärung. Dann eine Leerzeile vor dem nächsten Monat.

Schreibe "Monat 2 (Woche 5-8): Übung 3 und 4" als eigene fettgedruckte Zeile.
Dann eine Leerzeile, dann 2-3 Sätze. Dann Leerzeile.

Schreibe "Monat 3 (Woche 9-12): Übung 5 und 6" als eigene fettgedruckte Zeile.
Dann eine Leerzeile, dann 2-3 Sätze.

Schreibe "Bonus: Fortgeschrittene Übungen 7-9" als eigene fettgedruckte Zeile.
Dann eine Leerzeile, dann 1-2 Sätze: Für Hunde die die Grundlagen beherrschen. Diese Übungen kannst du ab Monat 2-3 ergänzen oder nach den 3 Monaten als Aufbau nutzen.

ABSCHNITT 3 - Schreibe die Überschrift "Tipps für den Erfolg" als eigene Zeile. Dann 4 Punkte, jeder Punkt so:

Schreibe den Tipp-Titel fett, dann Doppelpunkt, dann die Erklärung in derselben Zeile. Nach jedem Punkt eine Leerzeile.

Die 4 Punkte:
- Kurz und regelmäßig: 5-10 Minuten täglich bringen mehr als eine lange Einheit am Wochenende
- Immer positiv aufhören: Beende jede Einheit mit einem Erfolgserlebnis
- Rückschritte gehören dazu: Wenn es mal nicht klappt, geh einen Schritt zurück
- Du bist nicht allein: Bei Fragen erreichst du uns per E-Mail an support@pfoten-plan.de

=== (Seitenumbruch)
SEITEN 3-8 - GRUNDLAGEN (je eine Übung pro Seite):

Die ersten 6 Übungen sind die Basis. Sie starten einfach und werden progressiv schwieriger. Übung 1-2 sind Grundlagen, 3-4 Alltagsintegration, 5-6 fortgeschrittener.

Format pro Übung:

Übung [Nummer]: [Titel] – [Untertitel]

[Kurze Beschreibung was der Hund lernt, 1-2 Sätze]
[Ziel-Satz]

Schritt für Schritt

1. [Schritt-Titel]
[Erklärung Zeile 1]
[Erklärung Zeile 2]

(6 Schritte insgesamt)

Wie oft und wie lange
- [3-4 Punkte]

Worauf du achten solltest
- [3-4 Punkte]

Go's
- [genau 3 Punkte]

No Go's
- [genau 3 Punkte]

=== (Seitenumbruch)
SEITE 9 - ÜBERGANGSSEITE:

Titel: "Bereit für mehr? Fortgeschrittene Übungen"

Schreibe 2-3 Absätze:
- Erkläre dass die folgenden 3 Übungen für Hunde gedacht sind, die die Grundlagen bereits beherrschen
- Wann man damit starten sollte (wenn Übung 1-6 zuverlässig klappen)
- Diese Übungen sind anspruchsvoller und trainieren unter realistischen, schwierigeren Bedingungen
- Man kann sie als Ergänzung ab Monat 2-3 einbauen oder nach den 3 Monaten als Aufbau nutzen

=== (Seitenumbruch)
SEITEN 10-12 - FORTGESCHRITTENE ÜBUNGEN (je eine pro Seite):

3 weitere Übungen im selben Format wie oben (Schritt für Schritt, Go's, No Go's etc.)
Diese Übungen müssen DEUTLICH schwieriger sein als Übung 1-6:
- Mehr Ablenkung, realistischere Situationen, höherer Schwierigkeitsgrad
- Übungen die unter Stress, mit anderen Hunden, in unbekannter Umgebung funktionieren
- Für Hunde die die Basics schon können und eine echte Herausforderung brauchen
Nummeriere sie als Übung 7, 8, 9.

=== (Seitenumbruch)
LETZTE SEITE - ABSCHLUSS:
Titel: "Abschluss"

Schreibe 3-4 Absätze als Abschlusstext. Der Text soll sachlich-motivierend sein, NICHT kitschig oder übertrieben emotional. Vermeide Sätze wie "[Hundename] ist Familie" oder "Ihr schafft das zusammen". Stattdessen:
- Fasse zusammen, was die Übungen bewirken und warum Konsequenz wichtig ist
- Erkläre dass Veränderung nicht über Nacht passiert, aber mit regelmäßigem Training sichtbar wird
- Ermutige den Halter dranzubleiben und die Übungen in den Alltag zu integrieren
- Weise auf den E-Mail-Support hin (support@pfoten-plan.de)
Ton: professionell, ruhig, zuversichtlich - wie ein guter Trainer der am Ende einer Stunde zusammenfasst.

WEITERE REGELN:
- Alles auf Deutsch, Du-Form - KEINE englischen Begriffe verwenden (kein "Trigger", "Recall", "Impulse Control" etc. - immer die deutsche Entsprechung nutzen)
- Den Hundenamen aus dem Original übernehmen
- Praxisnah und konkret, keine allgemeinen Floskeln
- 6 Grundlagen-Übungen + 3 Fortgeschrittene Übungen, alle aufeinander aufbauend
- Go's und No Go's immer genau 3 Punkte, nicht mehr
- LAYOUT: Die linke Spalte enthält Übungstitel, Beschreibung, Schritt für Schritt (1-6). Die rechte Spalte enthält "Wie oft und wie lange", "Worauf du achten solltest", "Go's", "No Go's". So ergibt sich ein sauberes 2-Spalten-Layout.
- Gib NUR den Plan aus, keine Meta-Kommentare`,
                    messages: [{
                        role: 'user',
                        content: [
                            {
                                type: 'document',
                                source: { type: 'base64', media_type: 'application/pdf', data: pdfBase64 }
                            },
                            { type: 'text', text: userMessage }
                        ]
                    }]
                })
            });

            if (!res.ok) {
                const errText = await res.text();
                throw new Error('API Fehler (' + res.status + '): ' + errText.substring(0, 300));
            }

            const data = await res.json();
            const correctedPlan = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');

            document.getElementById('result-text').textContent = correctedPlan;

            // E-Mail Vorlage generieren
            const dn = document.getElementById('dog-name').value.trim() || 'Ihren Hund';
            const cn = document.getElementById('customer-name').value.trim();
            const anrede = cn ? ('Hallo ' + cn.split(' ')[0]) : 'Hallo';
            const emailText = anrede + ',\n\n' +
                'vielen Dank für deine Nachricht. Wir haben uns das angeschaut und den Trainingsplan für ' + dn + ' überarbeitet.\n\n' +
                'Im Anhang findest du die neue Version mit angepassten Übungen, die besser zu ' + dn + ' und eurer Situation passen.\n\n' +
                'Schau dir den Plan in Ruhe an. Falls du noch Fragen hast oder etwas unklar ist, melde dich jederzeit bei uns.\n\n' +
                'Liebe Grüße\n' +
                'Dein Pfoten-Plan Team\n' +
                'support@pfoten-plan.de';
            document.getElementById('email-text').textContent = emailText;

            document.getElementById('result-area').style.display = 'block';
        } catch (err) {
            document.getElementById('error-msg').textContent = 'Fehler: ' + err.message;
            document.getElementById('error-msg').style.display = 'block';
        } finally {
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('spinner').classList.remove('active');
        }
    }

    // Copy
    function copyResult() {
        const text = document.getElementById('result-text').textContent;
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('copy-toast');
            toast.textContent = 'Plan kopiert!';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        });
    }

    function copyEmail() {
        const text = document.getElementById('email-text').textContent;
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('copy-toast');
            toast.textContent = 'E-Mail kopiert!';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        });
    }

    async function downloadPDF() {
        const text = document.getElementById('result-text').textContent;
        const dogName = document.getElementById('dog-name').value.trim() || 'Hund';

        // Seiten aufteilen bei ===
        const pages = text.split(/={3,}/).map(p => p.trim()).filter(p => p.length > 0);

        let pagesHtml = '';
        pages.forEach((pageText, i) => {
            const isTitle = i === 0;
            const isIntro = i === 1;
            const isExercise = pageText.match(/^Übung \d+:/m);
            const isAbschluss = i === pages.length - 1 && i > 7;

            function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
            function formatBlock(t) {
                return esc(t)
                    // Überschriften wie "So nutzt du diesen Plan", "Dein 3-Monats-Fahrplan", "Tipps für den Erfolg", "Abschluss"
                    .replace(/^(So nutzt du diesen Plan|Dein 3-Monats-Fahrplan|Tipps für den Erfolg|Abschluss|Worum es geht)$/gm, '<h2 class="intro-heading">$1</h2>')
                    // Monat-Zeilen und fette Tipp-Titel
                    .replace(/^(Monat \d+ .+)$/gm, '<p class="month-title"><strong>$1</strong></p>')
                    .replace(/^(Kurz und regelmäßig:|Immer positiv aufhören:|Rückschritte gehören dazu:|Du bist nicht allein:)/gm, '<strong>$1</strong>')
                    .replace(/^(\d+\.\s.+)/gm, '<p class="step"><strong>$1</strong></p>')
                    .replace(/^- (.+)/gm, '<li>$1</li>')
                    .replace(/(<li>.*<\/li>\n?)+/gs, m => '<ul>' + m + '</ul>')
                    .replace(/\n{2,}/g, '</p><p class="spaced">')
                    .replace(/\n/g, '<br>');
            }

            if (isTitle) {
                pagesHtml += '<div class="page title-page">' +
                    '<div class="title-content">' +
                    '<h1>' + dogName + '\'s persönlicher<br>Zusatz-Plan</h1>' +
                    '<div class="title-divider"></div>' +
                    '</div></div>';
            } else if (isExercise) {
                // Übungsseite: 2-Spalten (Schritte links, Tipps rechts)
                const lines = pageText.split('\n');
                let title = '', desc = '', leftContent = '', rightContent = '';
                let section = 'top';

                for (const line of lines) {
                    if (line.match(/^Übung \d+:/)) { title = line; continue; }
                    if (line.match(/^Schritt für Schritt/)) { section = 'steps'; leftContent += '<h3>Schritt für Schritt</h3>'; continue; }
                    if (line.match(/^Wie oft und wie lange/)) { section = 'right'; rightContent += '<h3>Wie oft und wie lange</h3>'; continue; }
                    if (line.match(/^Worauf du achten solltest/)) { rightContent += '<h3>Worauf du achten solltest</h3>'; section = 'right'; continue; }
                    if (line.match(/^Go's/)) { rightContent += '<h3 class="gos">Go\'s</h3>'; section = 'right'; continue; }
                    if (line.match(/^No Go's/)) { rightContent += '<h3 class="nogos">No Go\'s</h3>'; section = 'right'; continue; }

                    if (section === 'top' && line.trim()) { desc += esc(line) + '<br>'; }
                    else if (section === 'steps' && line.trim()) {
                        if (line.match(/^\d+\./)) leftContent += '<p class="step"><strong>' + esc(line) + '</strong></p>';
                        else leftContent += '<p>' + esc(line) + '</p>';
                    }
                    else if (section === 'right' && line.trim()) {
                        if (line.startsWith('- ')) rightContent += '<li>' + esc(line.substring(2)) + '</li>';
                        else rightContent += '<p>' + esc(line) + '</p>';
                    }
                }
                // Listen wrappen
                rightContent = rightContent.replace(/(<li>.*?<\/li>)+/gs, m => '<ul>' + m + '</ul>');

                pagesHtml += '<div class="page">' +
                    '<div class="page-header"><span class="paw">🐾</span> <span>Pfoten-Plan</span></div>' +
                    '<h2 class="exercise-title">' + esc(title) + '</h2>' +
                    '<p class="exercise-desc">' + desc + '</p>' +
                    '<div class="two-col"><div class="col-left">' + leftContent + '</div><div class="col-right">' + rightContent + '</div></div>' +
                    '<div class="page-number">' + (i + 1) + '</div>' +
                    '</div>';
            } else {
                // Einleitung / Abschluss: einspaltig
                let content = formatBlock(pageText);
                pagesHtml += '<div class="page">' +
                    '<div class="page-header"><span class="paw">🐾</span> <span>Pfoten-Plan</span></div>' +
                    '<div class="page-content single-col"><p>' + content + '</p></div>' +
                    '<div class="page-number">' + (i + 1) + '</div>' +
                    '</div>';
            }
        });

        // Render-Container erstellen
        const wrapper = document.createElement('div');
        wrapper.id = 'pdf-pages';
        wrapper.innerHTML = pagesHtml;
        document.body.appendChild(wrapper);

        // Styles
        const s = document.createElement('style');
        s.textContent = `
            #pdf-pages { position: absolute; left: -9999px; top: 0; }
            #pdf-pages .page {
                width: 1122px; height: 793px;
                padding: 60px 75px 50px 75px;
                position: relative;
                background: #FAF8F5;
                overflow: hidden;
                box-sizing: border-box;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                color: #1a1a1a;
            }
            #pdf-pages .page-header {
                background: #C4A576;
                position: absolute; top: 0; left: 0; right: 0;
                padding: 8px 75px;
                text-align: center; color: white; font-weight: 700; font-size: 13px;
                display: flex; align-items: center; justify-content: center; gap: 8px;
            }
            #pdf-pages .page-header .paw { font-size: 14px; }
            #pdf-pages .page-content { margin-top: 30px; font-size: 12px; line-height: 1.5; }
            #pdf-pages .page-content.single-col { max-width: 80%; }
            #pdf-pages .intro-heading { font-size: 16px; font-weight: 800; color: #1a1a1a; margin: 14px 0 6px 0; }
            #pdf-pages .intro-heading:first-child { margin-top: 0; }
            #pdf-pages .month-title { margin: 10px 0 2px 0; font-size: 11px; }
            #pdf-pages .spaced { margin-top: 6px; }
            #pdf-pages .two-col { display: flex; gap: 30px; margin-top: 6px; }
            #pdf-pages .col-left { flex: 1.2; }
            #pdf-pages .col-right { flex: 1; }
            #pdf-pages .exercise-title { margin-top: 40px; font-size: 18px; font-weight: 800; margin-bottom: 6px; }
            #pdf-pages .exercise-desc { font-size: 11px; line-height: 1.45; margin-bottom: 6px; color: #333; }
            #pdf-pages .title-page { display: flex; align-items: center; justify-content: center; }
            #pdf-pages .title-page .page-header { display: none; }
            #pdf-pages .title-content h1 { font-size: 40px; font-weight: 800; line-height: 1.2; }
            #pdf-pages .title-divider { width: 180px; height: 3px; background: #C4A576; margin-top: 14px; }
            #pdf-pages h2 { font-size: 16px; font-weight: 800; margin: 0 0 6px 0; }
            #pdf-pages h3 { font-size: 11px; font-weight: 700; margin: 8px 0 3px 0; }
            #pdf-pages h3.gos { color: #166534; }
            #pdf-pages h3.nogos { color: #DC2626; }
            #pdf-pages p { margin-bottom: 3px; font-size: 10.5px; line-height: 1.35; }
            #pdf-pages .step { margin: 2px 0; }
            #pdf-pages ul { padding-left: 14px; margin: 2px 0 5px 0; }
            #pdf-pages li { font-size: 10px; margin-bottom: 1px; line-height: 1.3; }
            #pdf-pages .page-number { position: absolute; bottom: 10px; right: 75px; font-size: 11px; font-weight: 700; color: #999; }
        `;
        document.head.appendChild(s);

        // jsPDF + html2canvas laden
        const loadScript = (src) => new Promise(r => { const sc = document.createElement('script'); sc.src = src; sc.onload = r; document.head.appendChild(sc); });
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [1122, 793] });

        const pageEls = wrapper.querySelectorAll('.page');
        for (let i = 0; i < pageEls.length; i++) {
            const canvas = await html2canvas(pageEls[i], { scale: 2, backgroundColor: '#FAF8F5', useCORS: true });
            const imgData = canvas.toDataURL('image/jpeg', 0.92);
            if (i > 0) pdf.addPage([1122, 793], 'landscape');
            pdf.addImage(imgData, 'JPEG', 0, 0, 1122, 793);
        }

        pdf.save('Zusatz-Plan-' + dogName + '.pdf');
        document.body.removeChild(wrapper);
        document.head.removeChild(s);
    }
</script>
</body>
</html>
