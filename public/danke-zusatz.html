    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FAF8F5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 420px;
            text-align: center;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #22C55E, #16A34A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.3);
            animation: pop 0.5s ease;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .success-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }

        h1 {
            font-size: 26px;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .dog-name {
            color: #C4A576;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .order-box {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            text-align: left;
            margin-bottom: 24px;
        }

        .order-title {
            font-size: 14px;
            color: #999;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .order-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-icon {
            width: 44px;
            height: 44px;
            background: #FEF3E7;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .order-info h3 {
            font-size: 15px;
            color: #1a1a1a;
            margin-bottom: 2px;
        }

        .order-info p {
            font-size: 13px;
            color: #666;
        }

        .order-check {
            margin-left: auto;
            color: #22C55E;
            font-size: 20px;
        }

        .email-note {
            font-size: 14px;
            color: #666;
            background: #F8F8F8;
            padding: 16px;
            border-radius: 10px;
            line-height: 1.6;
        }

        .email-note strong {
            color: #1a1a1a;
        }

        .support-note {
            font-size: 13px;
            color: #999;
            text-align: center;
            margin-top: 16px;
        }

        .support-note a {
            color: #C4A576;
            text-decoration: none;
        }

        .support-note a:hover {
            text-decoration: underline;
        }
    </style>
<script
  defer
  data-website-id="dfid_7GbGWYlC43BwGzuWkUdwp"
  data-domain="pfoten-plan.de"
  src="https://datafa.st/js/script.js">
</script>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
            </svg>
        </div>

        <h1>Perfekt, <span class="dog-name">Luna</span>!</h1>
        <p class="subtitle">Dein erweitertes Training ist jetzt komplett.</p>

        <div class="order-box">
            <div class="order-title">Deine Bestellung</div>
            
            <div class="order-item" id="mainPlan">
                <div class="order-icon">📋</div>
                <div class="order-info">
                    <h3 id="mainProblemName">Trainingsplan</h3>
                    <p>Hauptproblem</p>
                </div>
                <span class="order-check">✓</span>
            </div>

            <div class="order-item" id="upsellModule">
                <div class="order-icon" id="moduleIcon">😰</div>
                <div class="order-info">
                    <h3 id="moduleName">Zusatz-Modul</h3>
                    <p id="moduleDesc">8 Übungen • 2 Wochen</p>
                </div>
                <span class="order-check">✓</span>
            </div>
        </div>

        <div class="email-note">
            📧 <strong>Beide Pläne</strong> werden in wenigen Minuten an deine E-Mail gesendet.
        </div>

        <div class="support-note">
            Fragen? Schreib uns an <a href="mailto:support@pfoten-plan.de">support@pfoten-plan.de</a>
        </div>
    </div>

    <script>
        // Supabase Config
        const SUPABASE_URL = 'https://xomsibpyksrzrnixbdwf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbXNpYnB5a3NyenJuaXhiZHdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY2NjMxMjIsImV4cCI6MjA3MjIzOTEyMn0.ZgCwog94HUHz39lbGMJkFPeZ6c-nL4AMFFTz5AgwnKE';

        // Hundename aus localStorage
        const dogName = localStorage.getItem('dogName') || 'dein Hund';
        document.querySelector('.dog-name').textContent = dogName;

        // Parameter aus URL
        const urlParams = new URLSearchParams(window.location.search);
        const module = urlParams.get('module');
        const leadId = urlParams.get('lead_id') || localStorage.getItem('leadId');

        // ALLE Module (inkl. fehlende)
        const moduleData = {
            'anxiety': { icon: '😰', name: 'Trennungsangst Prävention', exercises: '8 Übungen' },
            'pulling': { icon: '🦮', name: 'Leinenführigkeit Basics', exercises: '6 Übungen' },
            'barking': { icon: '🔊', name: 'Anti-Bell Training', exercises: '6 Übungen' },
            'aggression': { icon: '😤', name: 'Aggressions-Kontrolle', exercises: '8 Übungen' },
            'recall': { icon: '📣', name: 'Rückruf-Training', exercises: '6 Übungen' },
            'jumping': { icon: '🐕', name: 'Anti-Anspring Training', exercises: '5 Übungen' },
            'energy': { icon: '⚡', name: 'Energie-Management', exercises: '6 Übungen' },
            'destructive': { icon: '🧸', name: 'Anti-Zerstörungs Training', exercises: '6 Übungen' },
            'mouthing': { icon: '🦴', name: 'Anti-Aufnehm Training', exercises: '6 Übungen' }
        };

        if (module) {
            // Bundle erkennen (z.B. "pulling+anxiety")
            const isBundle = module.includes('+');
            
            let displayIcon, displayName, displayDesc, upsellValue;
            
            if (isBundle) {
                const modules = module.split('+');
                const mainModule = modules[0];
                displayIcon = '📦';
                displayName = 'Komplett-Paket';
                displayDesc = (moduleData[mainModule]?.name || mainModule) + ' + Prävention';
                upsellValue = module; // z.B. "pulling+anxiety"
            } else if (moduleData[module]) {
                displayIcon = moduleData[module].icon;
                displayName = moduleData[module].name;
                displayDesc = moduleData[module].exercises + ' • 2 Wochen';
                upsellValue = module;
            } else {
                displayIcon = '📋';
                displayName = 'Zusatz-Modul';
                displayDesc = 'Erweitertes Training';
                upsellValue = module;
            }
            
            document.getElementById('moduleIcon').textContent = displayIcon;
            document.getElementById('moduleName').textContent = displayName;
            document.getElementById('moduleDesc').textContent = displayDesc;
            
            // Upsell-Modul in Supabase speichern - IMMER wenn module vorhanden
            if (leadId) {
                console.log('🔍 Lead ID gefunden:', leadId);
                console.log('📦 Modul zu speichern:', upsellValue, '(Bundle:', isBundle, ')');

                fetch(`${SUPABASE_URL}/rest/v1/wauwerk_leads?id=eq.${leadId}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        upsell_module: upsellValue
                    })
                }).then(response => {
                    console.log('📡 Supabase Response Status:', response.status);
                    if (response.ok || response.status === 204) {
                        console.log('✅ Upsell-Modul gespeichert:', upsellValue);
                    } else {
                        response.text().then(text => console.error('❌ Supabase Fehler:', text));
                    }
                }).catch(err => {
                    console.error('❌ Supabase update error:', err);
                });
            } else {
                console.warn('⚠️ Keine lead_id gefunden! URL:', window.location.href);
                console.log('localStorage leadId:', localStorage.getItem('leadId'));
            }
        }

        // ERWEITERTE problemNames mit allen Custom-Keys
        const mainProblem = localStorage.getItem('dogProblem');
        const problemNames = {
            // Standard
            'pulling': 'Leinenziehen',
            'barking': 'Übermäßiges Bellen',
            'aggression': 'Aggression',
            'anxiety': 'Trennungsangst',
            'jumping': 'Anspringen',
            'recall': 'Kommt nicht zurück',
            'energy': 'Übermäßige Energie',
            'destructive': 'Zerstörerisches Verhalten',
            'soiling': 'In die Wohnung machen',
            'mouthing': 'Unerwünschtes Aufnehmen',
            // Custom Angst
            'visitor-anxiety': 'Angst bei Besuch',
            'thunder-anxiety': 'Gewitterangst',
            'noise-sensitivity': 'Geräuschempfindlichkeit',
            'general-anxiety': 'Allgemeine Ängstlichkeit',
            'stranger-anxiety': 'Angst vor Fremden',
            'anxious-overreaction': 'Ängstliche Überreaktion',
            'separation': 'Trennungsangst',
            // Custom Jagd
            'chasing': 'Jagdverhalten',
            'chasing-movement': 'Jagt Bewegungen',
            'prey-drive': 'Starker Jagdtrieb',
            'chasing-cars': 'Jagt Autos/Fahrräder',
            // Custom Fressen
            'eating-unwanted': 'Frisst Unerwünschtes',
            'eating-trash': 'Frisst aus dem Müll',
            'eating-objects': 'Frisst Gegenstände',
            // Custom Reaktivität
            'postman-reactive': 'Reaktiv auf Postboten',
            'dog-reactive': 'Reaktiv auf andere Hunde',
            'leash-reactive': 'Leinenreaktivität',
            'overreaction': 'Überreaktion auf Reize',
            // Custom Sonstiges
            'vocalization': 'Übermäßiges Lautgeben',
            'resource-guarding': 'Ressourcenverteidigung',
            'biting': 'Beißen/Schnappen',
            'digging': 'Buddeln',
            'marking': 'Markieren in der Wohnung',
            'custom-other': 'Sonstiges Verhalten'
        };

        if (mainProblem) {
            const problemText = problemNames[mainProblem] || mainProblem;
            document.getElementById('mainProblemName').textContent = problemText + '-Training';
        }
    </script>
</body>
