<!DOCTYPE html>
<html lang="de">
<head>
    <script src="/utm-tracking.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eine Empfehlung für dich | Pfoten-Plan</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" href="/favconHund.png">

    <!-- Google tag -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17806525009"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'AW-17806525009');
    </script>

    <!-- Meta Pixel -->
    <script>
        !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
        n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}
        (window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '864109602683515');
        fbq('track', 'PageView');
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FAF8F5;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 440px; margin: 0 auto; }

        /* Plan gesichert Banner */
        .secured-banner {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px;
            background: #F0FDF4;
            border: 1px solid #BBF7D0;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .secured-banner .check {
            width: 28px; height: 28px; background: #22C55E; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .secured-banner .check svg { width: 14px; height: 14px; color: white; }
        .secured-banner p { font-size: 14px; color: #166534; font-weight: 600; }

        /* Hero Card */
        .upsell-card {
            background: white; border-radius: 20px;
            padding: 28px 22px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin-bottom: 16px;
        }
        .upsell-card .eyebrow {
            font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
            text-transform: uppercase; color: #8B7355; margin-bottom: 6px;
        }
        .upsell-card h2 {
            font-size: 22px; font-weight: 800; color: #1a1a1a;
            line-height: 1.3; margin-bottom: 12px;
        }
        .upsell-hook {
            background: #FFF8E7; border-left: 3px solid #C4A576;
            padding: 12px 14px; border-radius: 0 8px 8px 0;
            margin-bottom: 18px;
            font-size: 13.5px; color: #5C4A2A; line-height: 1.55;
        }

        /* Module Card */
        .module-card {
            background: #FFFBF5; border: 2px solid #C4A576;
            border-radius: 14px; padding: 18px;
            position: relative; margin-bottom: 14px;
        }
        .module-card .badge {
            position: absolute; top: -10px; left: 16px;
            background: #C4A576; color: white;
            font-size: 11px; font-weight: 700;
            padding: 3px 10px; border-radius: 6px;
        }
        .module-header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 10px;
        }
        .module-icon { font-size: 28px; }
        .module-name {
            font-size: 16px; font-weight: 700; color: #1a1a1a;
            line-height: 1.3;
        }
        .module-desc {
            font-size: 14px; color: #555; line-height: 1.55;
            margin-bottom: 12px;
        }
        .module-benefits {
            display: flex; flex-direction: column; gap: 6px;
            margin-bottom: 14px;
        }
        .module-benefit {
            font-size: 13px; color: #1a1a1a; line-height: 1.5;
            padding-left: 22px; position: relative;
        }
        .module-benefit::before {
            content: '✓'; position: absolute; left: 0; top: 0;
            color: #166534; font-weight: 700;
        }
        .module-footer {
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; flex-wrap: wrap;
        }
        .module-price-old {
            font-size: 13px; color: #999; text-decoration: line-through;
            margin-right: 8px;
        }
        .module-price-new {
            font-size: 18px; font-weight: 800; color: #C4A576;
        }
        .module-btn {
            background: linear-gradient(135deg, #C4A576, #8B7355);
            color: white; border: none;
            padding: 12px 22px; border-radius: 10px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            transition: all 0.2s;
        }
        .module-btn:hover { transform: translateY(-1px); }
        .module-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .module-disclaimer {
            text-align: center; margin-top: 10px;
            font-size: 12px; color: #166534; font-weight: 500;
        }

        /* Social Proof */
        .social-proof {
            text-align: center; margin-top: 14px; font-size: 13px; color: #666;
        }
        .social-proof .dot {
            display: inline-block; width: 8px; height: 8px;
            background: #22C55E; border-radius: 50%; margin-right: 6px;
            box-shadow: 0 0 6px rgba(34,197,94,0.6);
            animation: livePulse 2s infinite;
        }
        @keyframes livePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Skip */
        .skip-btn {
            display: block; width: 100%; text-align: center;
            font-size: 13px; color: #999; background: none; border: none;
            padding: 12px; cursor: pointer; text-decoration: underline;
            transition: color 0.2s; opacity: 0;
        }
        .skip-btn:hover { color: #666; }

        /* Spinner */
        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 1-Click Success Overlay */
        @keyframes upsellFadeIn { from{opacity:0;} to{opacity:1;} }
        @keyframes upsellPop { 0%{transform:scale(0.8);opacity:0;} 60%{transform:scale(1.05);} 100%{transform:scale(1);opacity:1;} }
        @keyframes upsellCheck { from{stroke-dashoffset:60;} to{stroke-dashoffset:0;} }
    </style>
</head>
<body>
    <div class="container">
        <!-- Plan gesichert -->
        <div class="secured-banner">
            <div class="check">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <p>Dein Plan für <span class="dog-name">deinen Hund</span> ist gesichert</p>
        </div>

        <!-- Module Recommendation -->
        <div class="upsell-card">
            <p class="eyebrow">Eine ergänzende Empfehlung für <span class="dog-name">deinen Hund</span></p>
            <h2 id="upsellTitle">Mach <span class="dog-name">deinen Hund</span>s Training komplett</h2>

            <div class="upsell-hook" id="upsellHook">
                <!-- dynamisch befuellt -->
            </div>

            <div id="upsellModule">
                <!-- dynamisch befuellt -->
            </div>

            <div class="social-proof">
                <span class="dot"></span>
                <span style="color:#C4A576;font-weight:600;">347 Hundebesitzer</span> haben sich diese Ergänzung dazu geholt
            </div>
        </div>

        <!-- Skip -->
        <button class="skip-btn" id="skipBtn" onclick="skipToFinal()">
            Nein danke, nur meinen Plan starten →
        </button>
    </div>

    <script>
        const dogName = localStorage.getItem('dogName') || 'deinen Hund';
        const dogAge = localStorage.getItem('dogAge') || 'adult';
        const urlParamsInit = new URLSearchParams(window.location.search);
        const leadId = urlParamsInit.get('lead_id') || localStorage.getItem('leadId') || '';
        const userEmail = localStorage.getItem('userEmail') || '';

        document.querySelectorAll('.dog-name').forEach(el => { el.textContent = dogName; });

        // Skip nach 3s einblenden
        setTimeout(() => {
            const sb = document.getElementById('skipBtn');
            if (sb) sb.style.opacity = '1';
        }, 3000);

        function skipToFinal() {
            // Relativer Pfad — funktioniert sowohl lokal (file://) als auch live (Vercel)
            window.location.href = 'danke-final.html?lead_id=' + encodeURIComponent(leadId || '');
        }

        // ── Module mit Loss-Aversion / Schutz-Wording (40+ Hundebesitzer) ──
        // Statt "Trennungsangst-Praevention" → "Wenn du mal weg musst..."
        // Statt "Anti-Bell" → "Falls Bruno zum Beller wird"
        // Konkrete Pain-Trigger statt abstrakte Lernziele.
        const moduleData = {
            'anxiety': {
                icon: '🏠',
                name: 'Sicher allein bleiben — auch wenn du mal weg musst',
                exercises: '6 Übungen · 2 Wochen',
                benefits: [
                    'Ruhig bleiben wenn du in den Urlaub musst oder zum Arzt',
                    'Abschiedsrituale die den Stress sofort senken',
                    'Schritt-für-Schritt-Aufbau ohne Trauma'
                ],
                desc: 'Damit ' + dogName + ' nicht in Panik gerät, falls du mal kurzfristig weg musst.',
                hook: 'Trennungsangst kommt oft erst, wenn man sie nicht mehr verhindern kann — meist nach einer ersten längeren Trennung. Die Übungen darauf vor sind in 2 Wochen drin.'
            },
            'pulling': {
                icon: '🦮',
                name: 'Entspannte Spaziergänge — auch bei Hundebegegnungen',
                exercises: '6 Übungen · 2 Wochen',
                benefits: [
                    'Leinenziehen sicher stoppen — auch bei Ablenkung',
                    'Die Richtungswechsel-Technik aus dem Trainer-Alltag',
                    'Andere Hunde, Radfahrer, Jogger entspannt passieren lassen'
                ],
                desc: 'Damit du mit ' + dogName + ' wieder gerne rausgehst — ohne dass die Schulter wehtut.',
                hook: 'Leinenziehen wird selten von alleine besser, gerade bei reaktiven Hunden. Diese Übungen geben dir konkrete Techniken für den Alltag.'
            },
            'barking': {
                icon: '🔕',
                name: 'Ruhe für Besuch, Nachbarn & Nächte',
                exercises: '6 Übungen · 2 Wochen',
                benefits: [
                    'Bellen an der Tür konsequent abbauen',
                    'Ein klares Ruhe-Signal auf Kommando',
                    'Auslöser entschärfen statt unterdrücken'
                ],
                desc: 'Damit ' + dogName + ' nicht zum Stressfaktor in der Wohnung wird — gerade in der Mietwohnung.',
                hook: 'Viele Hunde fangen mit Bellen an, wenn das Haupt-Training erste Erfolge zeigt — ein Verdrängungsverhalten. Dieses Modul fängt das ab.'
            },
            'aggression': {
                icon: '🛡️',
                name: 'Sicherheit bei Hundebegegnungen',
                exercises: '6 Übungen · 2 Wochen',
                benefits: [
                    'Brenzlige Situationen rechtzeitig entschärfen',
                    'Impulskontrolle in echten Begegnungen aufbauen',
                    'Entspannung bei Distanz herstellen'
                ],
                desc: 'Damit du mit ' + dogName + ' wieder ohne Sorge an die Leine gehst — auch dort wo viele Hunde sind.',
                hook: 'Reaktivität auf andere Hunde wird ohne gezieltes Training schlimmer, nicht besser. Diese Übungen geben dir konkrete Werkzeuge für jede Begegnung.'
            },
            'recall': {
                icon: '📣',
                name: 'Sicherer Rückruf — auch am Wald und an der Straße',
                exercises: '6 Übungen · 2 Wochen',
                benefits: [
                    'Zuverlässiger Rückruf — auch bei hohem Reizniveau',
                    'Den Rückruf richtig aufbauen, nicht "verbrennen"',
                    'Freilauf ohne ständige Sorge'
                ],
                desc: 'Damit ' + dogName + ' im Notfall sofort zurückkommt — auch wenn ein Reh oder ein Auto in Sicht ist.',
                hook: 'Ein verbrannter Rückruf ist eines der größten Sicherheitsrisiken im Hundealltag. Diese Übungen bauen ihn sauber neu auf.'
            },
            'jumping': {
                icon: '🚪',
                name: 'Ruhige Begrüßungen — bei Besuch und an der Tür',
                exercises: '6 Übungen · 2 Wochen',
                benefits: [
                    'Vier-Pfoten-Regel die wirklich funktioniert',
                    'Besucher entspannt empfangen lassen',
                    'Anspringen umlenken statt verbieten'
                ],
                desc: 'Damit ' + dogName + ' Besuch ruhig begrüßt — gerade bei älteren Menschen oder Kindern.',
                hook: 'Anspringen ist gerade bei mittelgroßen und großen Hunden ein Sicherheitsthema. Dieses Modul löst es nachhaltig.'
            },
            'energy': {
                icon: '🌿',
                name: 'Lernen, abzuschalten — Ruhe-Training',
                exercises: '6 Übungen · 2 Wochen',
                benefits: [
                    'Gezielte Ruheübungen für jeden Tag',
                    'Kopfarbeit statt mehr Auspowern',
                    'Entspannungs-Signal aufbauen'
                ],
                desc: 'Damit ' + dogName + ' lernt, auch mal abzuschalten — statt ständig auf Empfang zu sein.',
                hook: 'Hunde die nicht zur Ruhe kommen, lernen schlechter. Ohne Ruhetraining bremst sich ' + dogName + ' im Alltag selbst aus.'
            },
            'destructive': {
                icon: '🧸',
                name: 'Möbel & Schuhe bleiben heil',
                exercises: '6 Übungen · 2 Wochen',
                benefits: [
                    'Erlaubte Alternativen sicher etablieren',
                    'Kauen und Zerstören umlenken statt strafen',
                    'Allein-zu-Hause ohne Chaos'
                ],
                desc: 'Damit du nicht jede Woche neue Schuhe oder Möbel kaufen musst.',
                hook: 'Zerstörungsverhalten ist meist ein Symptom von Stress oder Unterforderung. Dieses Modul setzt an der Ursache an.'
            },
            'mouthing': {
                icon: '🦴',
                name: 'Sicher draußen — nichts mehr vom Boden',
                exercises: '6 Übungen · 2 Wochen',
                benefits: [
                    'Das "Aus"-Kommando sicher aufbauen',
                    'Giftköder-Schutz im Alltag',
                    'Spaziergänge ohne Sorge'
                ],
                desc: 'Damit du nicht ständig kontrollieren musst was ' + dogName + ' aufnimmt.',
                hook: 'Giftköder, Glasscherben, Essensreste — draußen ist viel was gefährlich werden kann. Diese Übungen sichern dich ab.'
            }
        };

        // Dog-Problem aus Quiz / localStorage
        const answers = JSON.parse(localStorage.getItem('wauwerk_answers') || '{}');
        const dogGoal = answers.dog_goal || localStorage.getItem('dogProblemKey') || '';
        const dogProblem = answers.dog_problem || localStorage.getItem('dogProblem') || '';
        const dogBehaviors = answers.dog_behaviors || JSON.parse(localStorage.getItem('dogBehaviors') || '[]');
        const allUserProblems = [...new Set([dogGoal, dogProblem, ...dogBehaviors].filter(p => p))];

        // Relevanz-Map: welches Modul passt am besten zum Hauptproblem
        const relevanceMap = {
            'pulling':      ['recall', 'energy', 'jumping', 'aggression', 'barking', 'anxiety', 'destructive'],
            'recall':       ['pulling', 'energy', 'aggression', 'jumping', 'barking', 'anxiety', 'destructive'],
            'aggression':   ['energy', 'pulling', 'recall', 'anxiety', 'barking', 'jumping', 'destructive'],
            'anxiety':      ['destructive', 'energy', 'barking', 'pulling', 'recall', 'jumping', 'aggression'],
            'barking':      ['anxiety', 'energy', 'aggression', 'jumping', 'pulling', 'recall', 'destructive'],
            'jumping':      ['recall', 'pulling', 'energy', 'barking', 'aggression', 'anxiety', 'destructive'],
            'energy':       ['pulling', 'destructive', 'recall', 'jumping', 'barking', 'anxiety', 'aggression'],
            'destructive':  ['anxiety', 'energy', 'barking', 'pulling', 'recall', 'jumping', 'aggression'],
            'mouthing':     ['recall', 'energy', 'pulling', 'destructive', 'anxiety', 'barking', 'aggression']
        };

        function renderRecommendedModule() {
            const allModules = Object.keys(moduleData);
            const available = allModules.filter(m => !allUserProblems.includes(m));
            if (available.length === 0) {
                document.getElementById('upsellModule').innerHTML =
                    '<p style="text-align:center;color:#666;padding:20px;">Du hast schon alle Übungen — direkt loslegen!</p>';
                return;
            }
            const mainProblem = dogProblem || dogGoal || '';
            const order = relevanceMap[mainProblem] || [];
            const sorted = available.sort((a, b) => {
                const iA = order.indexOf(a); const iB = order.indexOf(b);
                return (iA === -1 ? 999 : iA) - (iB === -1 ? 999 : iB);
            });
            const recommended = sorted[0];
            const mod = moduleData[recommended];

            document.getElementById('upsellHook').textContent = mod.hook;

            const card = document.createElement('div');
            card.className = 'module-card';
            card.innerHTML = `
                <div class="badge">Passend zu deinem Plan</div>
                <div class="module-header">
                    <span class="module-icon">${mod.icon}</span>
                    <span class="module-name">${mod.name}</span>
                </div>
                <p class="module-desc">${mod.desc}</p>
                <div class="module-benefits">
                    ${mod.benefits.map(b => '<div class="module-benefit">' + b + '</div>').join('')}
                </div>
                <div class="module-footer">
                    <div>
                        <span class="module-price-old">€39</span>
                        <span class="module-price-new">€19,99</span>
                    </div>
                    <button class="module-btn" id="moduleBuyBtn" onclick="buyModule('${recommended}', '${mod.name.replace(/'/g, "\\'")}')">
                        Zum Plan hinzufügen
                    </button>
                </div>
                <div class="module-disclaimer">${mod.exercises} · Sofort per E-Mail · 30 Tage Garantie</div>
            `;
            document.getElementById('upsellModule').appendChild(card);
        }
        renderRecommendedModule();

        // ── 1-Click via Mandate / Fallback Mollie-Redirect ──
        async function tryOneClickUpsell(payload, productName) {
            try {
                const r = await fetch('/api/mollie/upsell-recurring', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const j = await r.json();
                if (j.ok) {
                    showUpsellSuccess(productName);
                    return true;
                }
                return false;
            } catch (e) { return false; }
        }

        function showUpsellSuccess(productName) {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;animation:upsellFadeIn 0.2s ease-out;';
            overlay.innerHTML = `
                <div style="background:#fff;border-radius:16px;padding:32px 28px;max-width:380px;width:100%;text-align:center;box-shadow:0 24px 48px rgba(0,0,0,0.22);animation:upsellPop 0.35s cubic-bezier(0.34,1.56,0.64,1);">
                    <div style="width:64px;height:64px;background:#DCFCE7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12" stroke-dasharray="60" style="animation:upsellCheck 0.4s ease-out 0.2s both;"/>
                        </svg>
                    </div>
                    <h3 style="font-size:18px;font-weight:800;color:#1a1a1a;margin:0 0 8px;">${productName} hinzugefügt!</h3>
                    <p style="font-size:14px;color:#4B5563;line-height:1.5;margin:0;">Kommt sofort per E-Mail.</p>
                </div>`;
            document.body.appendChild(overlay);
            setTimeout(() => {
                window.location.href = 'danke-final.html?downsell=true&lead_id=' + encodeURIComponent(leadId || '');
            }, 2500);
        }

        async function buyModule(module, productName) {
            const btn = document.getElementById('moduleBuyBtn');
            const originalText = btn.textContent;
            btn.innerHTML = '<span class="spinner"></span> Lädt...';
            btn.disabled = true;

            if (!userEmail) {
                alert('Fehler: Keine E-Mail gefunden.');
                btn.textContent = originalText;
                btn.disabled = false;
                return;
            }

            const oneClickOk = await tryOneClickUpsell({
                module: module,
                leadId: leadId,
                email: userEmail,
                dogName: dogName
            }, productName);
            if (oneClickOk) return;

            try {
                const returnUrl = window.location.origin + '/danke-final.html?downsell=true&module=' + encodeURIComponent(module) + '&lead_id=' + encodeURIComponent(leadId || '');
                const response = await fetch('/api/mollie/upsell-checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        module: module,
                        leadId: leadId,
                        email: userEmail,
                        dogName: dogName,
                        returnUrl: returnUrl
                    })
                });
                const result = await response.json();
                if (result.error || !result.url) {
                    alert('Fehler beim Laden. Bitte versuche es erneut.');
                    btn.textContent = originalText;
                    btn.disabled = false;
                    return;
                }
                window.location.href = result.url;
            } catch (err) {
                console.error('Module Error:', err);
                alert('Fehler beim Laden.');
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
