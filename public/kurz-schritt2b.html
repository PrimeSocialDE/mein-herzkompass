    <title>Pfoten-Plan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-brown: #C4A576;
            --brown-hover: #8B7355;
            --text-dark: #2C2C2E;
            --text-medium: #6B6B6B;
            --text-light: #999;
            --background-light: #FAFAFA;
            --white: #FFFFFF;
            --border-light: #E5E5E5;
            --light-brown: #D4B996;
            --dark-brown: #8B7355;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background-light);
            color: var(--text-dark);
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
        }
        .header {
            background: var(--white);
            padding: 16px 0;
            border-bottom: 1px solid var(--border-light);
            text-align: center;
        }
        .logo { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-dark); }
        .logo-image { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; }
        .logo-text { font-size: 22px; font-weight: 800; color: var(--text-dark); }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 30px 20px 120px;
            text-align: center;
        }

        .team-image-wrap {
            position: relative;
            margin-bottom: 24px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 6px 24px rgba(0,0,0,0.12);
        }
        .team-image-wrap img {
            width: 100%;
            height: auto;
            display: block;
        }
        .team-badge {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(6px);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            white-space: nowrap;
        }
        .team-badge .paw { font-size: 14px; }

        .headline {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-dark);
            line-height: 1.2;
            margin-bottom: 10px;
        }
        .headline strong {
            color: var(--primary-brown);
        }
        .subline {
            font-size: 15px;
            color: var(--text-medium);
            line-height: 1.5;
            margin-bottom: 28px;
            padding: 0 4px;
        }

        .quote {
            background: #FFFBF5;
            border-left: 4px solid var(--primary-brown);
            border-radius: 0 14px 14px 0;
            padding: 18px 20px;
            margin-bottom: 24px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .quote-content {
            flex: 1;
            min-width: 0;
        }
        .quote-text {
            font-size: 15px;
            color: var(--text-dark);
            line-height: 1.5;
            font-style: italic;
            margin-bottom: 10px;
        }
        .quote-author {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary-brown);
        }
        .quote-author-dot {
            width: 6px;
            height: 6px;
            background: var(--primary-brown);
            border-radius: 50%;
        }
        .quote-badge {
            flex-shrink: 0;
            width: 110px;
            height: 110px;
        }
        .quote-badge img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        @media (max-width: 480px) {
            .quote-badge { width: 90px; height: 90px; }
        }

        .continue-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 460px;
            background: var(--primary-brown);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 18px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(196, 165, 118, 0.4);
            text-decoration: none;
            display: block;
            text-align: center;
            transition: all 0.2s;
        }
        .continue-btn:hover {
            background: var(--brown-hover);
            transform: translateX(-50%) translateY(-2px);
        }

        @media (max-width: 480px) {
            .container { padding: 20px 16px 120px; }
            .headline { font-size: 22px; }
            .subline { font-size: 14px; margin-bottom: 22px; }
            .quote-text { font-size: 14px; }
        }
    </style>

            <img src="logo.png" alt="Pfoten-Plan Logo" class="logo-image">

        </a>
    </header>

    <div class="container">
        <div class="team-image-wrap">
            <img src="teamm-2.png" alt="Pfoten-Plan Team">
            <div class="team-badge">
                <span class="paw">🐾</span>
                <span>Dein Pfoten-Plan Team</span>
            </div>

        <h1 class="headline">Über <strong>3.447 Hundebesitzer</strong> vertrauen uns</h1>
        <p class="subline">Wir helfen dir und deinem Hund zu einem harmonischen Zusammenleben.</p>

        <div class="quote">
            <div class="quote-content">
                <p class="quote-text">„Unsere Methoden kommen direkt aus der modernen Hundetrainer-Praxis."</p>
                <div class="quote-author">
                    <span class="quote-author-dot"></span>
                    <span>Pfoten-Plan Team</span>
                </div>
            </div>
            <div class="quote-badge">
                <img src="Zertifiziert1.png" alt="Zertifizierte Trainingsmethoden">
